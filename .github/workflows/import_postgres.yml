name: IMPORT_SHEETS_TO_POSTGRES

on:
  workflow_dispatch:
    inputs:
      confirm_import:
        description: 'Type IMPORT to copy current Google Sheets data into Postgres'
        required: true
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  import:
    if: ${{ inputs.confirm_import == 'IMPORT' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -r requirements-bot.txt
      - name: Test
        run: python -m pytest -q
      - name: Import
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
        run: python scripts/import_sheets_to_postgres.py
