name: Keep Alive Action

on:
  schedule:
    # Запуск 1-го числа каждого месяца в 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch: # Позволяет запустить вручную для теста

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Даем боту право делать изменения в репозитории
    steps:
      - uses: actions/checkout@v4

      - name: Update keep_alive.txt
        run: |
          echo "Last keep-alive: $(date)" > keep_alive.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add keep_alive.txt
          git commit -m "Automated keep-alive to prevent workflow suspension"
          git push