name: ASO Daily Monitor V2

on:
  schedule:
    - cron: '47 14 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install google-play-scraper pandas requests

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GSHEET_URL: "https://docs.google.com/spreadsheets/d/1jHKBRyt0hJg29RWLIXZ2fL3et_hzvkhCSxVtTjKV9g/edit?gid=0#gid=0"
        run: python bot.py